version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
    build:
      commands:
        - NODE_ENV=production npm run build
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "SES_ACCESS_KEY_ID=$SES_ACCESS_KEY_ID" >> .env
        - echo "SES_SECRET_ACCESS_KEY=$SES_SECRET_ACCESS_KEY" >> .env
        - echo "SES_REGION=$SES_REGION" >> .env
        - echo "SES_FROM_ADDRESS=$SES_FROM_ADDRESS" >> .env
        - echo "APP_URL=$APP_URL" >> .env
        - echo "INVITE_PASS=$INVITE_PASS" >> .env
        - echo "CRON_SECRET=$CRON_SECRET" >> .env
        - echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> .env
        - echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> .env        
        - echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" >> .env        
        - echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" >> .env        
        - echo "STRIPE_TRAINER_PRICE_ID=$STRIPE_TRAINER_PRICE_ID" >> .env        
        - echo "STRIPE_CLIENT_PRICE_ID=$STRIPE_CLIENT_PRICE_ID" >> .env
        - echo "STRIPE_SIGNING_SECRET=$STRIPE_SIGNING_SECRET" >> .env

  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
